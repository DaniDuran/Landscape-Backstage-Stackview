app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: ${APP_BASE_URL}

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: ${BACKEND_BASE_URL}
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: ${BACKEND_LISTEN}
  auth:
    keys:
      - secret: ${BACKEND_SECRET}

  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt

auth:
  session:
    secret: ${AUTH_SESSION_SECRET}
  environment: production
  providers:
    oidc:
      production:
        clientId: ${OIDC_CLIENT_ID}
        clientSecret: ${OIDC_CLIENT_SECRET}
        metadataUrl: ${OIDC_METADATA_URL}
        callbackUrl: ${OIDC_CALLBACK_URL}
        prompt: auto
        signIn:
          # Keep only resolvers exported by the Backstage OIDC auth module.
          resolvers:
            - resolver: emailLocalPartMatchingUserEntityName
              dangerouslyAllowSignInWithoutUserInCatalog: true
            - resolver: emailMatchingUserEntityProfileEmail
              dangerouslyAllowSignInWithoutUserInCatalog: true
        groupsClaim: groups
        roleClaim: realm_access.roles

catalog:
  # Keep dynamic registration enabled so authenticated users can use /catalog-import.
  readonly: false

  locations:
    - type: file
      target: ./catalog/organization/*.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ./catalog/domains/*.yaml
      rules:
        - allow: [Domain]
    - type: file
      target: ./catalog/systems/*.yaml
      rules:
        - allow: [System]
    - type: file
      target: ./catalog/tools/*.yaml
      rules:
        - allow: [Component]
    - type: file
      target: ./catalog/libraries/*.yaml
      rules:
        - allow: [Component]
    - type: file
      target: ./catalog/services/*.yaml
      rules:
        - allow: [Component]

    # Keep default template for /create.
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
