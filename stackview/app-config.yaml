app:
  title: ${APP_TITLE}
  baseUrl: ${APP_BASE_URL}

organization:
  name: ${ORG_NAME}

backend:
  baseUrl: ${BACKEND_BASE_URL}
  listen: ${BACKEND_LISTEN}
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  cors:
    origin: ${APP_BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

proxy: {}

techdocs:
  builder: local
  generator:
    runIn: docker
  publisher:
    type: local

auth:
  providers:
    guest: {}

scaffolder: {}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  # Keep dynamic catalog registration enabled for /catalog-import.
  readonly: false

  rules:
    - allow: [Component, System, API, Resource, Location, Domain, User, Group, Template]

  locations:
    # --- ROOT CATALOG (repo /catalog) ---
    - type: file
      target: ../../../catalog/organization/*.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ../../../catalog/domains/*.yaml
      rules:
        - allow: [Domain]
    - type: file
      target: ../../../catalog/systems/*.yaml
      rules:
        - allow: [System]
    - type: file
      target: ../../../catalog/tools/*.yaml
      rules:
        - allow: [Component]
    - type: file
      target: ../../../catalog/libraries/*.yaml
      rules:
        - allow: [Component]
    - type: file
      target: ../../../catalog/services/*.yaml
      rules:
        - allow: [Component]

    # Keep the default example template available for /create.
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

kubernetes: {}

permission:
  enabled: true
